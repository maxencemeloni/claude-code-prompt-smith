  <text x="128" y="307" font-size="22" font-family="Inter, Arial, sans-serif" fill="#08111f">optimize</text>
  <text x="650" y="180" font-size="74" font-weight="700" font-family="Inter, Arial, sans-serif" fill="#f8fafc">Prompt Smith</text>
  <text x="650" y="240" font-size="30" font-family="Inter, Arial, sans-serif" fill="#cbd5e1">Clean prompt in. Strong prompt out.</text>
  <text x="650" y="312" font-size="24" font-family="Inter, Arial, sans-serif" fill="#94a3b8">Modes: default · agentic · compact · strict</text>
