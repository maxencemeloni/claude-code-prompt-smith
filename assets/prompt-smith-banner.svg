<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="500" viewBox="0 0 1600 500" role="img" aria-label="Prompt Smith banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="500" rx="28" fill="url(#bg)"/>
  <rect x="70" y="72" width="520" height="356" rx="24" fill="#0b1220" stroke="#334155"/>
  <rect x="104" y="112" width="452" height="18" rx="9" fill="#1e293b"/>
  <rect x="104" y="158" width="360" height="14" rx="7" fill="#243041"/>
  <rect x="104" y="190" width="410" height="14" rx="7" fill="#243041"/>
